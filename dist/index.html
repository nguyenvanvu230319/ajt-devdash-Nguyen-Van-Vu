<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDash - Asynchronous Dashboard</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        .toolbar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .search-input, .filter-select {
            background-color: var(--bg-card);
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
        }
        .search-input { flex: 1; min-width: 250px; }
        .search-input:focus { border-color: var(--accent); }

        .dashboard-content { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .dashboard-content { grid-template-columns: 1fr; } }

        .loading { color: var(--accent); font-size: 1.25rem; font-weight: bold; text-align: center; padding: 2rem; }
        .error-msg { color: var(--error); border: 1px solid var(--error); padding: 1rem; border-radius: 0.5rem; background: #450a0a; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background-color: var(--bg-card); border: 1px solid #334155; padding: 1.5rem; border-radius: 0.75rem; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .card h3 { font-size: 1.2rem; margin-bottom: 0.75rem; color: #fff; text-transform: capitalize; }
        .card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }
        .tag { display: inline-block; background: #334155; color: var(--accent); padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.8rem; margin-top: 1rem; }

        .detail-panel { background-color: var(--bg-card); border: 1px solid #334155; padding: 2rem; border-radius: 0.75rem; position: sticky; top: 2rem; height: fit-content; }
        .detail-panel h2 { color: var(--accent); margin-bottom: 1rem; text-transform: capitalize; }
        .detail-meta { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #334155; color: var(--text-muted); font-size: 0.9rem; }
    </style>
  <script type="module" crossorigin src="/assets/index-DF6lPUW5.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>DevDash</h1>
            <p style="color: var(--text-muted);">Trang Bảng tin Bất đồng bộ có Định kiểu Chuyên nghiệp</p>
        </header>

        <div class="toolbar">
            <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm bài viết theo tiêu đề (Debounced)...">
            <select id="filterUser" class="filter-select">
                <option value="">Tất cả tác giả</option>
            </select>
        </div>

        <div class="dashboard-content">
            <div id="mainContent">
                <div class="loading">Đang khởi tạo hệ thống DevDash...</div>
            </div>
            <div id="detailContent">
                <div class="detail-panel">
                    <h3>Thông tin chi tiết</h3>
                    <p style="color: var(--text-muted); margin-top: 1rem;">Chọn một bài viết bất kỳ để xem thông tin chuyên sâu.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
